<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="wrapper">
        <form id="registerForm" autocomplete="off">
            <fieldset id="userInfo">
                <legend>User Information:</legend>
                <div class="pairContainer">
                    <label for="username">Username:</label>
                    <input id="username" type="text" placeholder="Enter username" required>
                </div>
                <div class="pairContainer">
                    <label for="email">Email:</label>
                    <input id="email" type="text" placeholder="Enter email" required>
                </div>
                <div class="pairContainer">
                    <label for="password">Password:</label>
                    <input id="password" type="password" placeholder="Enter password" required>
                </div>
                <div class="pairContainer">
                    <label for="confirm-password">Confirm Password:</label>
                    <input id="confirm-password" type="password" placeholder="Confirm password" required>
                </div>
                <div class="pairContainer">
                    <label for="company">Is Company?</label>
                    <input id="company" type="checkbox">
                </div>
            </fieldset>
            <fieldset id="companyInfo" style="display: none;">
                <legend>Company Information:</legend>
                <div class="pairContainer">
                    <label for="companyNumber">Company Number</label>
                    <input id="companyNumber" type="number" placeholder="1000-9999">
                </div>
            </fieldset>
            <button id="submit">Submit</button>
        </form>
        <div id="valid" style="display: none;">✓ Valid</div>
    </div>
    <script src="formValidation.js"></script>
    <script>
        window.onload = function () {
            validate();
        }
    </script>
</body>

</html>
