<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <main>
        <div class="wrapper">
            <section>
                <div>
                    <h1 class="gray">Add Task</h1>
                </div>
                <div>
                    <form id="task-form">
                        <label for="task">Task</label><br>
                        <input type="text" id="task" name="task" placeholder="JS Advanced Exam"><br>
                        <label for="description">Description</label><br>
                        <textarea id="description" placeholder="Learn DOM, Unit Testing and Classes" rows="3"></textarea>
                        <label for="date">Due Date</label><br>
                        <input type="text" id="date" name="date" placeholder="2026.05.27"><br>
                        <button type="button" id="add">Add</button>
                    </form>
                </div>
            </section>

            <section>
                <div>
                    <h1 class="orange">Open</h1>
                </div>
                <div class="tasks-container">

                </div>
            </section>
            <section>
                <div>
                    <h1 class="yellow">In Progress</h1>
                </div>
                <div class="tasks-container">

                </div>
            </section>
            <section>
                <div>
                    <h1 class="green">Complete</h1>
                </div>
                <div class="tasks-container">

                </div>
            </section>
        </div>
    </main>
    <script src="./app.js"></script>
</body>

</html>
